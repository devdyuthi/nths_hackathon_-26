<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Meal Match</title>
  <link rel="stylesheet" href="login.css" />
  <script src="script.js" defer></script> 
</head>

<body>
  <section class="login-screen">
    <div class="login-card hero-card">
      <span class="eyebrow">Welcome back</span>
      <h1>Login to Meal Match</h1>
      <p class="muted">
        Enter your email to access your dashboard.
      </p>

      <form id="loginForm">
        <input id="loginEmail" type="email" placeholder="Email" required />
        <button class="button primary full-width" type="submit">
          Login
        </button>
      </form>

      <div class="footer-note">
        <a href="login.html">Don't have an account? Sign up →</a>
      </div>

      <div class="footer-note">
        <a href="index.html">← Back to landing page</a>
      </div>
    </div>
  </section>
</body>

</html>
